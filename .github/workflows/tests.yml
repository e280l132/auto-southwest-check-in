name: Run automated tests

on:
  push:
    branches:
      - master
      - develop
    paths:
      - "**.py"
      - "**/requirements.txt"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "**.py"
      - "**/requirements.txt"
      - ".github/workflows/tests.yml"

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install uv and setup Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt -r tests/requirements.txt
      - name: Run unit tests
        run: uv run pytest tests/unit --cov --cov-fail-under=100
      - name: Run integration tests
        if: github.event.pull_request || github.ref == 'refs/heads/master'
        run: uv run pytest tests/integration --cov
